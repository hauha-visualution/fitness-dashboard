name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # ── 4. Lint ───────────────────────────────────────────────────────────────
      - name: Lint
        run: npm run lint -- --max-warnings 55

      # ── 5. Unit tests ─────────────────────────────────────────────────────────
      - name: Run unit tests
        run: npm test
        env:
          # Dummy values — tests run in node env, no real Supabase calls
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder_anon_key

      # NOTE: Production build is handled by Vercel (with real env vars).
      # No need to build here — avoids supabaseUrl errors from missing secrets.

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Aesthetics Hub Fitness Icon">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="900" y2="940" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#13263a"/>
      <stop offset="0.5" stop-color="#081629"/>
      <stop offset="1" stop-color="#050d1b"/>
    </linearGradient>

    <radialGradient id="bgGlowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(292 230) rotate(32) scale(560)">
      <stop offset="0" stop-color="#d2ff60" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#d2ff60" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="bgGlowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(780 770) rotate(38) scale(520)">
      <stop offset="0" stop-color="#59b9ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#59b9ff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ring" x1="204" y1="200" x2="820" y2="826" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d1ff5f" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#58b8ff" stop-opacity="0.62"/>
    </linearGradient>

    <linearGradient id="dbMain" x1="322" y1="416" x2="704" y2="608" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d9ff63"/>
      <stop offset="0.5" stop-color="#9be96a"/>
      <stop offset="1" stop-color="#6cc8ff"/>
    </linearGradient>

    <linearGradient id="dbGlass" x1="360" y1="400" x2="694" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>

    <linearGradient id="dbInner" x1="366" y1="430" x2="656" y2="580" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#cbff66" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#74cfff" stop-opacity="0.92"/>
    </linearGradient>

    <filter id="dbSoftGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect x="40" y="40" width="944" height="944" rx="238" fill="url(#bg)"/>
  <rect x="40" y="40" width="944" height="944" rx="238" fill="url(#bgGlowA)"/>
  <rect x="40" y="40" width="944" height="944" rx="238" fill="url(#bgGlowB)"/>

  <rect x="116" y="116" width="792" height="792" rx="198" fill="none" stroke="url(#ring)" stroke-opacity="0.42" stroke-width="8"/>

  <!-- Dumbbell only (no outer frame), glassmorphic + gradient -->
  <g>
    <!-- glow behind dumbbell -->
    <rect x="324" y="430" width="376" height="164" rx="82" fill="url(#dbMain)" opacity="0.32" filter="url(#dbSoftGlow)"/>

    <!-- center bar -->
    <rect x="420" y="492" width="184" height="40" rx="20" fill="url(#dbInner)"/>
    <rect x="420" y="492" width="184" height="40" rx="20" fill="url(#dbGlass)"/>

    <!-- inner plates (updated to match overall dumbbell) -->
    <rect x="360" y="438" width="52" height="148" rx="20" fill="url(#dbInner)"/>
    <rect x="612" y="438" width="52" height="148" rx="20" fill="url(#dbInner)"/>
    <rect x="360" y="438" width="52" height="148" rx="20" fill="url(#dbGlass)"/>
    <rect x="612" y="438" width="52" height="148" rx="20" fill="url(#dbGlass)"/>

    <!-- outer plates -->
    <rect x="328" y="418" width="38" height="188" rx="16" fill="url(#dbMain)"/>
    <rect x="658" y="418" width="38" height="188" rx="16" fill="url(#dbMain)"/>
    <rect x="328" y="418" width="38" height="188" rx="16" fill="url(#dbGlass)"/>
    <rect x="658" y="418" width="38" height="188" rx="16" fill="url(#dbGlass)"/>

    <!-- grip caps -->
    <rect x="314" y="470" width="14" height="84" rx="7" fill="#061223" fill-opacity="0.36"/>
    <rect x="696" y="470" width="14" height="84" rx="7" fill="#061223" fill-opacity="0.36"/>

    <!-- crisp highlight edges -->
    <rect x="328" y="418" width="38" height="188" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
    <rect x="360" y="438" width="52" height="148" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>
    <rect x="420" y="492" width="184" height="40" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>
    <rect x="612" y="438" width="52" height="148" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>
    <rect x="658" y="418" width="38" height="188" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
  </g>
</svg>
